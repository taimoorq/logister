test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

amazon:
  service: S3
  access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] || Rails.application.credentials.dig(:aws, :access_key_id) %>
  secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] || Rails.application.credentials.dig(:aws, :secret_access_key) %>
  region: <%= ENV.fetch("AWS_REGION", "us-east-1") %>
  bucket: <%= ENV.fetch("AWS_S3_BUCKET", "logister-#{Rails.env}") %>
<% if ENV["AWS_S3_ENDPOINT"].present? %>
  endpoint: <%= ENV["AWS_S3_ENDPOINT"] %>
  force_path_style: <%= ActiveModel::Type::Boolean.new.cast(ENV.fetch("AWS_S3_FORCE_PATH_STYLE", "false")) %>
<% end %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

