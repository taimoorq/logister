production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  project_telemetry_retention:
    class: ProjectRetentionSweepJob
    schedule: every day at 2am
  project_monitor_sweep:
    class: ProjectMonitorSweepJob
    schedule: every 15 minutes
  project_health_notification_sweep:
    class: ProjectHealthNotificationSweepJob
    schedule: every 15 minutes
