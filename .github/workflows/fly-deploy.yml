# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  verify_required_workflows:
    name: Require CI and CodeQL
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      deploy_sha: ${{ steps.required_workflows.outputs.deploy_sha }}
    steps:
      - name: Wait for required workflows
        id: required_workflows
        uses: actions/github-script@v7
        with:
          script: |
            const requiredWorkflows = ["CI", "CodeQL"];
            const deploySha = context.eventName === "workflow_run"
              ? context.payload.workflow_run.head_sha
              : context.sha;
            const deployBranch = context.eventName === "workflow_run"
              ? context.payload.workflow_run.head_branch
              : context.ref.replace("refs/heads/", "");

            if (deployBranch !== "main") {
              core.setFailed(`Fly deploy only runs for main; got ${deployBranch}.`);
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const timeoutMs = 45 * 60 * 1000;
            const pollMs = 30 * 1000;
            const startedAt = Date.now();

            async function workflowByName(name) {
              const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              return workflows.find((workflow) => workflow.name === name);
            }

            async function latestRunForSha(workflowId) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch: "main",
                per_page: 100,
              });

              return runs
                .filter((run) => run.head_sha === deploySha)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            }

            const workflowMap = new Map();
            for (const name of requiredWorkflows) {
              const workflow = await workflowByName(name);
              if (!workflow) {
                core.setFailed(`Required workflow not found: ${name}`);
                return;
              }
              workflowMap.set(name, workflow);
            }

            while (true) {
              const waiting = [];

              for (const [name, workflow] of workflowMap) {
                const run = await latestRunForSha(workflow.id);

                if (!run || run.status !== "completed") {
                  waiting.push(name);
                  continue;
                }

                if (run.conclusion !== "success") {
                  core.setFailed(`${name} did not pass for ${deploySha}: ${run.html_url}`);
                  return;
                }

                core.info(`${name} passed for ${deploySha}: ${run.html_url}`);
              }

              if (waiting.length === 0) {
                core.setOutput("deploy_sha", deploySha);
                return;
              }

              if (Date.now() - startedAt > timeoutMs) {
                core.setFailed(`Timed out waiting for required workflows on ${deploySha}: ${waiting.join(", ")}`);
                return;
              }

              core.info(`Waiting for required workflows on ${deploySha}: ${waiting.join(", ")}`);
              await sleep(pollMs);
            }

  deploy:
    name: Deploy app
    needs: verify_required_workflows
    runs-on: ubuntu-latest
    if: ${{ needs.verify_required_workflows.outputs.deploy_sha != '' }}
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify_required_workflows.outputs.deploy_sha }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Ensure Fly API token is configured
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "Missing FLY_API_TOKEN GitHub secret. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Read release config
        id: release_config
        run: |
          ruby <<'RUBY' >> "$GITHUB_OUTPUT"
          require "yaml"

          config = YAML.load_file("config/release.yml")
          puts "enabled=#{config.dig("github", "create_release_on_deploy") ? "true" : "false"}"
          puts "app_name=#{config.fetch("app_name")}"
          puts "tag_prefix=#{config.fetch("tag_prefix", "v")}"
          puts "changelog_path=#{config.fetch("changelog_path", "CHANGELOG.md")}"
          puts "make_latest=#{config.dig("github", "make_latest") ? "true" : "false"}"
          RUBY
      - name: Extract release metadata
        id: release_meta
        if: steps.release_config.outputs.enabled == 'true'
        run: |
          ruby <<'RUBY' >> "$GITHUB_OUTPUT"
          changelog_path = "${{ steps.release_config.outputs.changelog_path }}"
          app_name = "${{ steps.release_config.outputs.app_name }}"
          tag_prefix = "${{ steps.release_config.outputs.tag_prefix }}"
          changelog = File.read(changelog_path)

          version_match = changelog.match(/^##\s+(v[0-9][^\s]*)\s+-\s+([0-9]{4}-[0-9]{2}-[0-9]{2})\s*$/.freeze)
          unless version_match
            warn "No versioned changelog entry found in #{changelog_path}"
            exit 1
          end

          version = version_match[1]
          version = "#{tag_prefix}#{version}" unless version.start_with?(tag_prefix)
          release_date = version_match[2]
          release_start = version_match.begin(0)
          next_heading = changelog.index(/^##\s+/, version_match.end(0))
          release_body = changelog[release_start...(next_heading || changelog.length)].strip

          puts "tag_name=#{version}"
          puts "release_name=#{app_name} #{version}"
          puts "release_date=#{release_date}"
          puts "release_body<<EOF"
          puts release_body
          puts "EOF"
          RUBY
      - name: Publish GitHub release
        if: steps.release_config.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ needs.verify_required_workflows.outputs.deploy_sha }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body: ${{ steps.release_meta.outputs.release_body }}
          make_latest: ${{ steps.release_config.outputs.make_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
