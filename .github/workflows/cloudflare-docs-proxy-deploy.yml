name: Cloudflare Docs Proxy Deploy

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-docs-proxy/**"
      - ".github/workflows/cloudflare-docs-proxy-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs proxy Worker
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-docs-proxy-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Ensure Cloudflare Worker configuration is present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub secret."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Deploy docs proxy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.84.0"
          command: deploy --config cloudflare-docs-proxy/wrangler.toml
