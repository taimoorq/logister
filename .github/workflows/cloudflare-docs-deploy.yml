name: Cloudflare Docs Deploy

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-docs/**"
      - "docs/openapi.yaml"
      - "docs/postman/**"
      - "bin/build-cloudflare-docs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cloudflare-docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-docs-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Ensure Cloudflare Pages configuration is present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub secret."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_PAGES_PROJECT}" ]; then
            echo "Missing CLOUDFLARE_PAGES_PROJECT GitHub variable."
            exit 1
          fi

      - name: Build docs metadata
        env:
          LOGISTER_DOCS_URL: ${{ vars.LOGISTER_DOCS_URL }}
          DOCS_SITEMAP_LASTMOD: ${{ vars.DOCS_SITEMAP_LASTMOD }}
        run: bin/build-cloudflare-docs

      - name: Deploy static docs
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy cloudflare-docs
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --commit-dirty=true
