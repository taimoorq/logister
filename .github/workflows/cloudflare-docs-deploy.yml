name: Cloudflare Docs Deploy

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-docs/**"
      - ".github/workflows/cloudflare-docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-docs-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure Cloudflare Pages configuration is present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub variable."
            exit 1
          fi

          if [ -z "${CLOUDFLARE_PAGES_PROJECT}" ]; then
            echo "Missing CLOUDFLARE_PAGES_PROJECT GitHub variable."
            exit 1
          fi

      - name: Build optional docs analytics config
        env:
          DOCS_GOOGLE_TAG_ID: ${{ vars.DOCS_GOOGLE_TAG_ID }}
          DOCS_CLOUDFLARE_WEB_ANALYTICS_TOKEN: ${{ vars.DOCS_CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
        run: |
          if [ -n "${DOCS_GOOGLE_TAG_ID}" ]; then
            docs_google_tag_id_json=$(ruby -rjson -e 'print JSON.generate(ARGV.first)' "${DOCS_GOOGLE_TAG_ID}")
          else
            docs_google_tag_id_json=null
          fi

          if [ -n "${DOCS_CLOUDFLARE_WEB_ANALYTICS_TOKEN}" ]; then
            docs_cloudflare_analytics_token_json=$(ruby -rjson -e 'print JSON.generate(ARGV.first)' "${DOCS_CLOUDFLARE_WEB_ANALYTICS_TOKEN}")
          else
            docs_cloudflare_analytics_token_json=null
          fi

          cat > cloudflare-docs/assets/analytics-config.js <<EOF
          window.LOGISTER_DOCS_ANALYTICS = {
            googleTagId: ${docs_google_tag_id_json},
            cloudflareWebAnalyticsToken: ${docs_cloudflare_analytics_token_json}
          };
          EOF

      - name: Deploy static docs
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy cloudflare-docs
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --commit-dirty=true
